<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 930" role="img" aria-labelledby="title desc">
  <title id="title">Modulo de alimentacao de PLC</title>
  <desc id="desc">Fonte de alimentacao de PLC no trilho DIN com saida VO igual a 24 VDC e IO.</desc>
  <defs>
